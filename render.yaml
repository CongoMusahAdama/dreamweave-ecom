# HARV DREAMS — Render Blueprint (single web service: React + Express API)
# Repo layout: if your Git root is the parent "HARV" folder, set Root Directory to "harv" in the dashboard.
# If your Git root is this "harv" folder, leave Root Directory empty.

services:
  - type: web
    name: harv
    runtime: node
    plan: free
    buildCommand: npm run render:build
    startCommand: npm run render:start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: FRONTEND_URL
        sync: false
      - key: ADMIN_EMAIL
        value: harv@admin.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: VITE_WHATSAPP_NUMBER
        sync: false
