# HARV DREAMS — Render API (frontend hosted on Netlify)
# Set FRONTEND_URL to your Netlify URL. On Netlify set VITE_API_URL to this service URL.

services:
  - type: web
    name: harv-api
    runtime: node
    plan: free
    buildCommand: npm run render:build
    startCommand: npm run render:start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: FRONTEND_URL
        sync: false
      - key: ADMIN_EMAIL
        value: harv@admin.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: API_PUBLIC_URL
        value: https://harv.onrender.com
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      # Paystack webhook: https://<this-service>/api/payments/webhook
